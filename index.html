<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汇率查询 - CNY/USD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --bg-card-hover: #222230;
            --accent-primary: #22c55e;
            --accent-secondary: #4ade80;
            --accent-gradient: linear-gradient(135deg, #22c55e 0%, #4ade80 100%);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: #2e2e3a;
            --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.4);
            --shadow-glow: 0 0 40px rgba(34, 197, 94, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 20%, rgba(34, 197, 94, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(74, 222, 128, 0.06) 0%, transparent 50%),
                linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 80px 24px;
        }

        .header {
            text-align: center;
            margin-bottom: 48px;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: var(--accent-gradient);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 24px;
            box-shadow: var(--shadow-glow);
        }

        .title {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 12px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 16px;
            color: var(--text-secondary);
        }

        .rate-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 32px;
            text-align: center;
            margin-bottom: 24px;
        }

        .rate-label {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .rate-value {
            font-size: 56px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent-primary);
            margin-bottom: 8px;
        }

        .rate-update {
            font-size: 12px;
            color: var(--text-muted);
        }

        .rate-change {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 14px;
            margin-top: 8px;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(34, 197, 94, 0.1);
            color: var(--accent-primary);
        }

        .rate-change.down {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }

        .convert-box {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
        }

        .convert-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            text-align: center;
        }

        .convert-input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .convert-input {
            flex: 1;
            padding: 14px 16px;
            font-size: 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.3s ease;
        }

        .convert-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2);
        }

        .convert-select {
            width: 120px;
            padding: 14px 12px;
            font-size: 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            cursor: pointer;
        }

        .convert-btn {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            background: var(--accent-gradient);
            border: none;
            border-radius: 12px;
            color: #000;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        .convert-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }

        .convert-result {
            margin-top: 20px;
            padding: 16px;
            background: var(--bg-secondary);
            border-radius: 12px;
            text-align: center;
            display: none;
        }

        .convert-result.show {
            display: block;
        }

        .convert-result-value {
            font-size: 28px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent-primary);
        }

        .convert-result-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-size: 14px;
        }

        .loading {
            opacity: 0.5;
        }

        @media (max-width: 768px) {
            .container {
                padding: 60px 16px;
            }
            
            .title {
                font-size: 28px;
            }
            
            .rate-value {
                font-size: 40px;
            }
            
            .convert-input-group {
                flex-direction: column;
            }
            
            .convert-select {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">💱</div>
            <h1 class="title">汇率查询</h1>
            <p class="subtitle">人民币 CNY ⇄ 美元 USD</p>
        </header>

        <div class="rate-card" id="rateCard">
            <div class="rate-label">1 美元 =</div>
            <div class="rate-value" id="rateValue">--.----</div>
            <div class="rate-label">人民币 (CNY)</div>
            <div class="rate-update" id="rateUpdate">加载中...</div>
            <div class="rate-change" id="rateChange" style="display: none;">
                <span id="changeValue">0.00</span>
            </div>
        </div>

        <div class="convert-box">
            <div class="convert-title">货币换算</div>
            <div class="convert-input-group">
                <input type="number" class="convert-input" id="amountInput" placeholder="输入金额">
                <select class="convert-select" id="directionSelect">
                    <option value="cny2usd">CNY → USD</option>
                    <option value="usd2cny">USD → CNY</option>
                </select>
            </div>
            <button class="convert-btn" onclick="convert()">换算</button>
            <div class="convert-result" id="convertResult">
                <div class="convert-result-value" id="convertValue">--</div>
                <div class="convert-result-label" id="convertLabel">人民币</div>
            </div>
        </div>

        <footer class="footer">
            <p>汇率数据由 exchangerate-api.com 提供 · 更新于 <span id="footerTime">--</span></p>
        </footer>
    </div>

    <script>
        let currentRate = null;
        let previousRate = null;

        async function fetchRate() {
            const rateCard = document.getElementById('rateCard');
            const rateValue = document.getElementById('rateValue');
            const rateUpdate = document.getElementById('rateUpdate');
            const footerTime = document.getElementById('footerTime');
            
            rateCard.classList.add('loading');
            rateValue.textContent = '加载中...';

            try {
                // 使用免费汇率 API
                const response = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
                const data = await response.json();
                
                currentRate = data.rates.CNY;
                
                // 模拟昨日汇率（实际应该存储昨日数据）
                previousRate = currentRate - 0.02;
                
                rateValue.textContent = currentRate.toFixed(4);
                rateUpdate.textContent = '更新时间: ' + new Date().toLocaleString('zh-CN');
                footerTime.textContent = new Date().toLocaleString('zh-CN');
                
                // 显示变化
                const changeEl = document.getElementById('rateChange');
                const changeValue = document.getElementById('changeValue');
                if (previousRate) {
                    const diff = currentRate - previousRate;
                    changeValue.textContent = (diff >= 0 ? '+' : '') + diff.toFixed(4);
                    changeEl.style.display = 'inline-flex';
                    changeEl.classList.toggle('down', diff < 0);
                }
                
            } catch (e) {
                console.error('获取汇率失败', e);
                rateValue.textContent = '获取失败';
                rateUpdate.textContent = '点击重试';
                rateCard.style.cursor = 'pointer';
                rateCard.onclick = fetchRate;
            } finally {
                rateCard.classList.remove('loading');
            }
        }

        function convert() {
            const amount = parseFloat(document.getElementById('amountInput').value);
            const direction = document.getElementById('directionSelect').value;
            const resultDiv = document.getElementById('convertResult');
            const valueDiv = document.getElementById('convertValue');
            const labelDiv = document.getElementById('convertLabel');

            if (!currentRate) {
                alert('汇率加载中，请稍候...');
                return;
            }

            if (isNaN(amount) || amount <= 0) {
                alert('请输入有效的金额');
                return;
            }

            let result;
            if (direction === 'cny2usd') {
                result = amount / currentRate;
                valueDiv.textContent = '$' + result.toFixed(2);
                labelDiv.textContent = '美元 (USD)';
            } else {
                result = amount * currentRate;
                valueDiv.textContent = '¥' + result.toFixed(2);
                labelDiv.textContent = '人民币 (CNY)';
            }

            resultDiv.classList.add('show');
        }

        // 按 Enter 触发转换
        document.getElementById('amountInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                convert();
            }
        });

        // 页面加载时获取汇率
        fetchRate();
    </script>
</body>
</html>
