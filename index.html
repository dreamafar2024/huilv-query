<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汇率查询 - CNY/USD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --bg-card-hover: #222230;
            --accent-primary: #eab308;
            --accent-secondary: #fbbf24;
            --accent-gradient: linear-gradient(135deg, #eab308 0%, #fbbf24 100%);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: #2e2e3a;
            --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.4);
            --shadow-glow: 0 0 40px rgba(234, 179, 8, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 20%, rgba(234, 179, 8, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(251, 191, 36, 0.06) 0%, transparent 50%),
                linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 80px 24px;
        }

        .header {
            text-align: center;
            margin-bottom: 48px;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: var(--accent-gradient);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 24px;
            box-shadow: var(--shadow-glow);
        }

        .title {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 12px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 16px;
            color: var(--text-secondary);
        }

        .rate-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 32px;
            text-align: center;
            margin-bottom: 24px;
        }

        .rate-label {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .rate-value {
            font-size: 48px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent-primary);
            margin-bottom: 8px;
        }

        .rate-update {
            font-size: 12px;
            color: var(--text-muted);
        }

        .convert-box {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
        }

        .convert-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            text-align: center;
        }

        .convert-input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .convert-input {
            flex: 1;
            padding: 14px 16px;
            font-size: 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.3s ease;
        }

        .convert-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(234, 179, 8, 0.2);
        }

        .convert-select {
            width: 100px;
            padding: 14px 12px;
            font-size: 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            cursor: pointer;
        }

        .convert-btn {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            background: var(--accent-gradient);
            border: none;
            border-radius: 12px;
            color: #000;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        .convert-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }

        .convert-result {
            margin-top: 20px;
            padding: 16px;
            background: var(--bg-secondary);
            border-radius: 12px;
            text-align: center;
            display: none;
        }

        .convert-result.show {
            display: block;
        }

        .convert-result-value {
            font-size: 28px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent-primary);
        }

        .convert-result-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 60px 16px;
            }
            
            .title {
                font-size: 28px;
            }
            
            .rate-value {
                font-size: 36px;
            }
            
            .convert-input-group {
                flex-direction: column;
            }
            
            .convert-select {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">💱</div>
            <h1 class="title">汇率查询</h1>
            <p class="subtitle">人民币 CNY ⇄ 美元 USD</p>
        </header>

        <div class="rate-card">
            <div class="rate-label">1 美元 =</div>
            <div class="rate-value" id="rateValue">--.----</div>
            <div class="rate-label">人民币 (CNY)</div>
            <div class="rate-update" id="rateUpdate">加载中...</div>
        </div>

        <div class="convert-box">
            <div class="convert-title">货币换算</div>
            <div class="convert-input-group">
                <input type="number" class="convert-input" id="amountInput" placeholder="输入金额">
                <select class="convert-select" id="directionSelect">
                    <option value="cny2usd">CNY → USD</option>
                    <option value="usd2cny">USD → CNY</option>
                </select>
            </div>
            <button class="convert-btn" onclick="convert()">换算</button>
            <div class="convert-result" id="convertResult">
                <div class="convert-result-value" id="convertValue">--</div>
                <div class="convert-result-label" id="convertLabel">人民币</div>
            </div>
        </div>

        <footer class="footer">
            <p>汇率数据仅供参考 · 更新于 <span id="footerTime">--</span></p>
        </footer>
    </div>

    <script>
        let currentRate = 7.24; // 默认汇率

        // 模拟获取汇率（实际应该调用 API）
        async function fetchRate() {
            try {
                // 这里可以用真实的汇率 API
                // 暂时使用模拟数据
                currentRate = 7.24 + (Math.random() * 0.02 - 0.01);
                updateDisplay();
            } catch (e) {
                console.error('获取汇率失败', e);
                document.getElementById('rateValue').textContent = '获取失败';
                document.getElementById('rateUpdate').textContent = '请刷新页面重试';
            }
        }

        function updateDisplay() {
            document.getElementById('rateValue').textContent = currentRate.toFixed(4);
            document.getElementById('rateUpdate').textContent = '更新时间: ' + new Date().toLocaleString('zh-CN');
            document.getElementById('footerTime').textContent = new Date().toLocaleString('zh-CN');
        }

        function convert() {
            const amount = parseFloat(document.getElementById('amountInput').value);
            const direction = document.getElementById('directionSelect').value;
            const resultDiv = document.getElementById('convertResult');
            const valueDiv = document.getElementById('convertValue');
            const labelDiv = document.getElementById('convertLabel');

            if (isNaN(amount) || amount <= 0) {
                alert('请输入有效的金额');
                return;
            }

            let result;
            if (direction === 'cny2usd') {
                result = amount / currentRate;
                valueDiv.textContent = '$' + result.toFixed(2);
                labelDiv.textContent = '美元 (USD)';
            } else {
                result = amount * currentRate;
                valueDiv.textContent = '¥' + result.toFixed(2);
                labelDiv.textContent = '人民币 (CNY)';
            }

            resultDiv.classList.add('show');
        }

        // 按 Enter 触发转换
        document.getElementById('amountInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                convert();
            }
        });

        // 页面加载时获取汇率
        fetchRate();
    </script>
</body>
</html>
